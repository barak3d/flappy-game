<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>קִירְבִּי טָס בְּחֶשְׁבּוֹן</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-wrapper">
    <canvas id="gameCanvas" width="480" height="640"></canvas>
    <button id="muteBtn">🔊 קוֹל דָּלוּק</button>
    <div id="start-screen" class="overlay">
      <h1>קִירְבִּי טָס בְּחֶשְׁבּוֹן</h1>
      <p>פִּתְרוּ אֶת הַתַּרְגִּיל וְעוּפוּ דֶּרֶךְ ⭐ הַתְּשׁוּבָה הַנְּכוֹנָה!</p>
      <p class="instructions">לִחְצוּ <strong>רֶוַח</strong> אוֹ <strong>הַקִּישׁוּ</strong> כְּדֵי לָעוּף</p>
      <button id="startBtn">הַתְחִילוּ לְשַׂחֵק</button>
    </div>
    <div id="game-over-screen" class="overlay hidden">
      <h1>הַמִּשְׂחָק נִגְמַר!</h1>
      <p>נִקּוּד: <span id="finalScore">0</span></p>
      <button id="restartBtn">שַׂחֲקוּ שׁוּב</button>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
